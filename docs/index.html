<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Evan Lee's Website</title>

  <style>
    :root{
      --bg1:#0b1328;           /* galactic blue */
      --bg2:#060914;           /* near-black blue */
      --text:#9aa3b2;          /* grey text */
      --node:#4ade80;          /* soft neon green */
      --link:rgba(200,210,220,0.25); /* light gray lines */
    }

    html, body {
      margin: 0;
      height: 100%;
      background: radial-gradient(circle at top, var(--bg1), var(--bg2));
      color: var(--text);
      font: 16px/1.5 system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    /* Minimal top-left header */
    .header {
      position: fixed;
      top: 18px;
      left: 18px;
      z-index: 10;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 12px 14px;
      border-radius: 12px;
      backdrop-filter: blur(6px);
      max-width: min(520px, calc(100vw - 36px));
    }

    .name {
      margin: 0 0 6px;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.2px;
      color: #c7cfdd;
    }

    .bio {
      margin: 0 0 8px;
      font-size: 14px;
      color: var(--text);
    }

    .links a {
      color: #c7cfdd;
      text-decoration: none;
      margin-right: 10px;
      font-size: 14px;
      white-space: nowrap;
      opacity: 0.9;
    }
    .links a:hover { text-decoration: underline; text-underline-offset: 3px; opacity: 1; }

    /* Bottom-left mouse hint */
    .hint {
      position: fixed;
      left: 18px;
      bottom: 18px;
      z-index: 10;
      font-size: 13px;
      color: var(--text);
      background: rgba(0,0,0,0.28);
      border: 1px solid rgba(255,255,255,0.07);
      padding: 10px 12px;
      border-radius: 12px;
      backdrop-filter: blur(6px);
    }
  </style>
</head>

<body>
  <div class="header">
    <p class="name">Evan (Yao-Chen) Lee</p>
    <p class="bio">I am an incoming @ Brown for Applied Math-Computer Science. I'm interested in alignment, normativity, and infinity~
    </p>
    <div class="links">
      <a href="mailto:evanyclee1@gmail.com">Email</a>
      <a href="https://substack.com/@evanyclee?" rel="noreferrer">Substack</a>
      <a href="https://www.linkedin.com/in/evan-l-15b0072a2/" rel="noreferrer">LinkedIn</a>
      <a href="https://www.instagram.com/itpfoodreview/" rel="noreferrer">Eats</a>
    </div>
  </div>
</script>  
</body>
</html>
